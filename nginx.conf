# MidClaw — Nginx config para VPS Hostinger
# Copie para: /etc/nginx/sites-available/midclaw
# Ative: ln -s /etc/nginx/sites-available/midclaw /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # Redireciona HTTP → HTTPS (descomente depois de instalar o certificado)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:7432;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SSE (streaming de chat) — sem buffer, sem timeout
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}

